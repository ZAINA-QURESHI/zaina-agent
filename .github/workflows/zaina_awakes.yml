name: Zaina Autonomous Routine

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

env:
  # This resolves the Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-zaina:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-genai requests beautifulsoup4 duckduckgo-search

      - name: Wake Zaina Up
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Push to Archive
        run: |
          git config --global user.name "Zaina-Qureshi-Agent"
          git config --global user.email "zaina@agent.ai"
          git add index.html
          git commit -m "Zaina: Autonomic Evolution [$(date)]" || echo "No changes"
          git push
