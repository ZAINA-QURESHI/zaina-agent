name: Zaina Awakes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  awaken:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4g

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Generate intervention
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit site and archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive.html latest.json archive zaina_bio.md
          git diff --cached --quiet || git commit -m "Zaina intervention archive update"
          git push
